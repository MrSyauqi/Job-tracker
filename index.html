<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYAUQI WORKTRACKING PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8 bg-slate-50">
    <div class="max-w-md mx-auto">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter">SYAUQI <span class="text-blue-600">WORKTRACKING</span></h1>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">Field Service & Vision Systems</p>
            </div>
            <div id="connectionDot" class="h-3 w-3 bg-red-500 rounded-full animate-pulse shadow-sm mb-1"></div>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <input id="jc" list="customerData" placeholder="Customer Name (e.g. Factory A)" class="w-full mb-3 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 font-bold">
            <datalist id="customerData"></datalist>

            <div class="flex gap-2 mb-4">
                <input id="jt" placeholder="Issue/Task (e.g. Camera Alignment)" class="w-2/3 p-3 border rounded-xl outline-none">
                <select id="jp" class="w-1/3 p-3 border rounded-xl bg-slate-50 outline-none text-xs font-bold">
                    <option value="1">Low</option>
                    <option value="2" selected>Med</option>
                    <option value="3">High 🚨</option>
                </select>
            </div>

            <button id="addBtn" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl active:scale-95 transition shadow-lg">Register New Job</button>
        </div>

        <div class="flex border-b mb-4 bg-white rounded-t-xl overflow-hidden text-sm font-bold">
            <button id="pTabBtn" class="tab-btn tab-active flex-1 py-4">Active Jobs (<span id="pC">0</span>)</button>
            <button id="cTabBtn" class="tab-btn flex-1 py-4 text-slate-400">History (<span id="cC">0</span>)</button>
        </div>

        <div id="pV" class="space-y-3"></div>
        <div id="cV" class="hidden space-y-3"></div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>

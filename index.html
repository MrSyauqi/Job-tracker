<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syauqi Case Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-slate-200">
        
        <div class="p-8 border-b bg-white flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-slate-800 uppercase">
                    SYAUQI <span class="text-slate-400 font-light">CASE TRACKER</span>
                </h1>
                <p id="currentDateTime" class="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest"></p>
            </div>
            <div class="flex items-center gap-2">
                <span id="connectionText" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Checking...</span>
                <div id="connectionDot" class="h-4 w-4 bg-slate-300 rounded-full border-2 border-white shadow-sm transition-all duration-500"></div>
            </div>
        </div>

        <div class="bg-slate-50/50 p-6 border-b grid grid-cols-1 md:grid-cols-5 gap-4">
            <input id="jc" list="customerList" placeholder="CUSTOMER" class="p-4 border rounded-lg text-sm font-black uppercase outline-none focus:ring-2 focus:ring-slate-800 transition">
            <datalist id="customerList"></datalist>
            <input id="jt" placeholder="ISSUE SUMMARY" class="p-4 border rounded-lg text-sm md:col-span-2 uppercase outline-none focus:ring-2 focus:ring-slate-800 transition">
            <input id="rt" placeholder="TICKET ID" class="p-4 border rounded-lg text-sm font-mono outline-none focus:ring-2 focus:ring-slate-800 transition uppercase">
            <select id="jp" class="p-4 border rounded-lg text-sm font-black bg-white outline-none cursor-pointer">
                <option value="3">CRITICAL</option>
                <option value="2" selected>PENDING</option>
                <option value="1">SOLVED</option>
            </select>
            <button onclick="addJob()" class="md:col-span-5 bg-slate-900 text-white py-4 rounded-lg font-black text-xs uppercase tracking-[0.3em] hover:bg-black transition-all">
                Register Case
            </button>
        </div>

        <div class="p-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Case Overall</h3>
                <input id="search" oninput="renderDashboard()" type="text" placeholder="SEARCH SITE..." class="w-full md:w-72 p-3 border rounded-full text-xs font-bold uppercase outline-none focus:ring-2 focus:ring-slate-200">
            </div>
            <div id="customerGrid" class="bg-white rounded-xl border shadow-sm divide-y"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

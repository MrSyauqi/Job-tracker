<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORK TRACK</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <header class="p-6 border-b flex justify-between items-center">
            <h1 class="text-2xl font-bold uppercase tracking-tighter">Work Track</h1>
            <div id="connectionDot" class="h-3 w-3 bg-red-500 rounded-full"></div>
        </header>

        <div class="p-6 border-b grid grid-cols-1 md:grid-cols-4 gap-2 bg-slate-50">
            <input id="jc" placeholder="CUSTOMER" class="p-2 border rounded uppercase text-sm font-bold">
            <input id="jt" placeholder="ISSUE" class="p-2 border rounded uppercase text-sm">
            <input id="rt" placeholder="TICKET ID" class="p-2 border rounded text-sm font-mono">
            <select id="jp" class="p-2 border rounded font-bold text-sm">
                <option value="3">CRITICAL</option>
                <option value="2" selected>PENDING</option>
                <option value="1">SOLVED</option>
            </select>
            <button onclick="window.addJob()" class="md:col-span-4 bg-slate-800 text-white p-3 rounded font-black text-xs uppercase">Register Record</button>
        </div>

        <div id="customerGrid" class="divide-y"></div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>

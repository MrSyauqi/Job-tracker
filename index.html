<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYAUQI TECHNICAL TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 p-2 md:p-6 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="bg-white p-6 rounded-t-xl border-b flex justify-between items-center shadow-sm">
            <div>
                <h1 class="text-3xl font-light text-slate-800 border-b-2 border-slate-300 inline-block pb-1 uppercase tracking-tighter">Work Track</h1>
                <p id="currentDateTime" class="text-[10px] text-slate-500 mt-2 font-bold uppercase tracking-widest"></p>
            </div>
            <div class="flex items-center gap-4">
                <div id="connectionStatus" class="text-right hidden md:block">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Database Status</p>
                    <p id="statusText" class="text-xs font-bold text-red-500 uppercase">Connecting...</p>
                </div>
                <div id="connectionDot" class="h-4 w-4 bg-red-500 rounded-full shadow-sm"></div>
            </div>
        </header>

        <div class="bg-white p-6 border-b grid grid-cols-1 md:grid-cols-5 gap-3 shadow-sm">
            <input id="jc" list="customerData" placeholder="CUSTOMER (e.g. FLEX_P1)" class="p-3 border rounded text-sm font-black uppercase bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
            <input id="jt" placeholder="ISSUE SUMMARY / TECHNICAL FAULT" class="p-3 border rounded text-sm md:col-span-2 uppercase outline-none focus:ring-2 focus:ring-blue-500">
            <input id="rt" placeholder="REPORT ID / TICKET" class="p-3 border rounded text-sm font-mono outline-none focus:ring-2 focus:ring-blue-500">
            <select id="jp" class="p-3 border rounded text-sm font-black bg-blue-50 outline-none">
                <option value="3">🚨 CRITICAL / URGENT</option>
                <option value="2" selected>⏳ NORMAL / PENDING</option>
                <option value="1">✅ SOLVED / ARCHIVE</option>
            </select>
            <button id="addBtn" onclick="window.addJob(event)" class="md:col-span-5 bg-slate-800 text-white py-4 rounded font-black text-xs uppercase tracking-widest hover:bg-black active:scale-95 transition shadow-lg">Register Technical Record</button>
            <datalist id="customerData"></datalist>
        </div>

        <div class="bg-white rounded-b-xl shadow-lg min-h-[500px]">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-tighter">Technical Fleet & Site History</h2>
                <input id="search" onkeyup="window.renderDashboard()" placeholder="FILTER SITE..." class="text-[10px] p-2 border rounded w-48 uppercase font-bold outline-none">
            </div>
            <div id="customerGrid" class="divide-y">
                </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>

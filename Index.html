<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbase Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-slate-800">WORKBASE CLOUD</h1>
            <div id="connectionDot" class="h-2 w-2 bg-red-500 rounded-full animate-pulse"></div>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <input id="jt" placeholder="Job Name" class="w-full mb-3 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <input id="jc" placeholder="Location" class="w-2/3 p-3 border rounded-xl outline-none">
                <button id="addBtn" class="w-1/3 bg-blue-600 text-white font-bold rounded-xl active:scale-95 transition">Add</button>
            </div>
        </div>

        <div class="flex border-b mb-4 bg-white rounded-t-xl overflow-hidden text-sm">
            <button id="pTabBtn" class="tab-btn tab-active flex-1 py-3">Pending (<span id="pC">0</span>)</button>
            <button id="cTabBtn" class="tab-btn flex-1 py-3 text-slate-400">History (<span id="cC">0</span>)</button>
        </div>

        <div id="pV" class="space-y-3"></div>
        <div id="cV" class="hidden space-y-3"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
